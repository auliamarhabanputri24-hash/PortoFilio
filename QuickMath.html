<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickMath - Tantangan 10 Detik</title>

<style>
:root{
--primary:#6C5CE7;
--secondary:#A29BFE;
--bg-gradient:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);
--correct:#00b894;
--wrong:#ff7675;
--text:#2d3436;
}

*{
box-sizing:border-box;
font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
}

body{
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
color:var(--text);
}

.card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:2rem;
border-radius:24px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
width:400px;
max-width:95%;
text-align:center;
animation:fadeIn 0.5s ease-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.hidden{
display:none !important;
}

h1{
color:var(--primary);
margin-bottom:0.5rem;
}

.timer-bar{
width:100%;
height:8px;
background:#eee;
border-radius:4px;
margin:20px 0;
overflow:hidden;
}

#progress{
width:100%;
height:100%;
background:var(--primary);
transition:width 1s linear;
}

.question{
font-size:1rem;
font-weight:bold;
margin:20px 0;
}

input[type="number"]{
width:120px;
padding:12px;
font-size:1.5rem;
border:2px solid #ddd;
border-radius:12px;
text-align:center;
}

button{
background:var(--primary);
color:white;
border:none;
padding:12px 30px;
font-size:1.1rem;
border-radius:12px;
cursor:pointer;
margin-top:20px;
}

button:hover{
background:var(--secondary);
transform:scale(1.05);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
font-size:0.9rem;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:var(--secondary);
color:white;
}
</style>
</head>

<body>

<div class="card" id="game-card">

<div id="start-screen">
<h1>QuickMath! ⚡</h1>
<p>Jawab 10 soal secepat mungkin.<br>Waktu tiap soal hanya 10 detik!</p>
<button onclick="startGame()">Mulai Bermain</button>
</div>

<div id="play-screen" class="hidden">
<div id="question-number">Soal 1 / 10</div>
<div class="timer-bar"><div id="progress"></div></div>
<div class="question" id="display-question">0 + 0</div>

<input type="number" id="answer-input" placeholder="?">
<br>
<small>Tekan Enter untuk jawab</small>
</div>

<div id="result-screen" class="hidden">
<h1>Selesai! 🎉</h1>
<div id="final-score">Skor: 0</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Soal</th>
<th>Input</th>
<th>Jawaban</th>
<th>Status</th>
</tr>
</thead>

<tbody id="result-body"></tbody>
</table>

<button onclick="startGame()">Main Lagi</button>
</div>

</div>

<script>

let currentQuestion=0;
let score=0;
let timeLeft=10;
let timerInterval;
let gameData=[];
let currentAnswer=0;

const startScreen=document.getElementById("start-screen");
const playScreen=document.getElementById("play-screen");
const resultScreen=document.getElementById("result-screen");
const inputField=document.getElementById("answer-input");
const progress=document.getElementById("progress");

function startGame(){
currentQuestion=0;
score=0;
gameData=[];
startScreen.classList.add("hidden");
resultScreen.classList.add("hidden");
playScreen.classList.remove("hidden");
nextQuestion();
}

function generateQuestion(){
const ops=["+","-","*","/"];
let a=Math.floor(Math.random()*10);
let b=Math.floor(Math.random()*10);
let op=ops[Math.floor(Math.random()*4)];

if(op==="/"){
if(b===0)b=1;
a=a*b;
}

let qText=`${a} ${op.replace("*","x").replace("/","÷")} ${b}`;
let ans=0;

if(op==="+")ans=a+b;
else if(op==="-")ans=a-b;
else if(op==="*")ans=a*b;
else if(op==="/")ans=a/b;

return {qText,ans};
}

function nextQuestion(){

if(currentQuestion>=10){
endGame();
return;
}

currentQuestion++;

document.getElementById("question-number").innerText=
`Soal ${currentQuestion} / 10`;

const q=generateQuestion();
document.getElementById("display-question").innerText=q.qText;

currentAnswer=q.ans;

inputField.value="";
inputField.focus();

startTimer();
}

function startTimer(){

clearInterval(timerInterval);

timeLeft=10;

progress.style.width="100%";
progress.style.transition="none";

progress.offsetHeight;

progress.style.transition="width 10s linear";
progress.style.width="0%";

timerInterval=setInterval(()=>{

timeLeft--;

if(timeLeft<=0){
processAnswer(null);
}

},1000);
}

function processAnswer(userValue){

clearInterval(timerInterval);

const isCorrect=
userValue!==null && parseInt(userValue)===currentAnswer;

if(isCorrect){
score+=10;
}

gameData.push({
question:document.getElementById("display-question").innerText,
input:userValue!==null ? userValue : "Waktu Habis",
correct:currentAnswer,
status:isCorrect
});

nextQuestion();
}

function endGame(){

playScreen.classList.add("hidden");
resultScreen.classList.remove("hidden");

document.getElementById("final-score").innerText=
`Skor Akhir: ${score}`;

const tBody=document.getElementById("result-body");

tBody.innerHTML="";

gameData.forEach((data,index)=>{

const row=document.createElement("tr");

row.innerHTML=`
<td>${index+1}</td>
<td>${data.question}</td>
<td>${data.input}</td>
<td>${data.correct}</td>
<td>${data.status ? "Benar" : "Salah"}</td>
`;

tBody.appendChild(row);

});
}

inputField.addEventListener("keypress",(e)=>{
if(e.key==="Enter" && inputField.value!==""){
processAnswer(inputField.value);
}
});

</script>

</body>
</html>
